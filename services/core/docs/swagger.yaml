basePath: /api/v1
definitions:
  ai.GeneratedPlan:
    properties:
      description:
        type: string
      tasks:
        items:
          $ref: '#/definitions/ai.GeneratedTask'
        type: array
      title:
        type: string
    type: object
  ai.GeneratedTask:
    properties:
      description:
        type: string
      title:
        type: string
    type: object
  dto.AnswerRequest:
    properties:
      answer:
        type: string
      question_id:
        type: string
    type: object
  dto.AssignManagerRequest:
    properties:
      manager_id:
        type: string
    required:
    - manager_id
    type: object
  dto.CreateAIPlanRequest:
    properties:
      description:
        type: string
      employee_id:
        type: string
      topic:
        type: string
    required:
    - employee_id
    - topic
    type: object
  dto.CreateAIPlanResponse:
    properties:
      id:
        type: string
    type: object
  dto.CreatePlanRequest:
    properties:
      description:
        type: string
      employee_id:
        type: string
      title:
        type: string
    type: object
  dto.CreatePlanResponse:
    properties:
      id:
        type: string
    type: object
  dto.CreateTaskRequest:
    properties:
      description:
        type: string
      title:
        type: string
    required:
    - title
    type: object
  dto.CreateTaskResponse:
    properties:
      id:
        type: string
    type: object
  dto.EmployeeProfileResponse:
    properties:
      plans:
        items:
          $ref: '#/definitions/dto.PlanResponse'
        type: array
      skills:
        items:
          $ref: '#/definitions/dto.SkillResponse'
        type: array
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  dto.GeneratePlanRequest:
    properties:
      description:
        type: string
      position:
        type: string
      topic:
        type: string
    required:
    - topic
    type: object
  dto.ListPlansResponse:
    properties:
      plans:
        items:
          $ref: '#/definitions/dto.PlanResponse'
        type: array
    type: object
  dto.ListSkillsResponse:
    properties:
      skills:
        items:
          $ref: '#/definitions/dto.SkillResponse'
        type: array
    type: object
  dto.ListUsersResponse:
    properties:
      users:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  dto.PlanResponse:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      creation_type:
        type: string
      description:
        type: string
      employee_id:
        type: string
      generation_status:
        type: string
      id:
        type: string
      progress:
        type: integer
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  dto.PlanWithTasksResponse:
    properties:
      plan:
        $ref: '#/definitions/dto.PlanResponse'
      tasks:
        items:
          $ref: '#/definitions/dto.TaskResponse'
        type: array
    type: object
  dto.ProfileResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      position:
        type: string
      role:
        type: string
    type: object
  dto.QuestionResponse:
    properties:
      id:
        type: string
      options:
        items:
          type: string
        type: array
      question:
        type: string
    type: object
  dto.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RefreshResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    type: object
  dto.RegisterResponse:
    properties:
      id:
        type: string
    type: object
  dto.SkillResponse:
    properties:
      category:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  dto.StartTestResponse:
    properties:
      questions:
        items:
          $ref: '#/definitions/dto.QuestionResponse'
        type: array
      test_id:
        type: string
    type: object
  dto.SubmitTestRequest:
    properties:
      answers:
        items:
          $ref: '#/definitions/dto.AnswerRequest'
        type: array
    type: object
  dto.SubmitTestResponse:
    properties:
      passed:
        type: boolean
      score:
        type: integer
      total:
        type: integer
    type: object
  dto.TaskResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      plan_id:
        type: string
      position:
        type: integer
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  dto.UpdatePasswordRequest:
    properties:
      new_password:
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  dto.UpdatePlanRequest:
    properties:
      description:
        type: string
      title:
        type: string
    required:
    - title
    type: object
  dto.UpdatePositionRequest:
    properties:
      position:
        type: string
    type: object
  dto.UpdateProfileRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
    type: object
  dto.UpdateRoleRequest:
    properties:
      role:
        type: string
    required:
    - role
    type: object
  dto.UpdateTaskRequest:
    properties:
      description:
        type: string
      title:
        type: string
    type: object
  dto.UpdateTaskStatusRequest:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  dto.UserDetailsResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      manager_id:
        type: string
      position:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      manager_id:
        type: string
      position:
        type: string
      role:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: Mandzhonson
  description: REST API для SkillTracker.
  title: SkillTracker API
  version: "1.0"
paths:
  /admin/managers/{id}/employees:
    get:
      consumes:
      - application/json
      description: Возвращает список сотрудников, закрепленных за менеджером
      parameters:
      - description: ID менеджера
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.UserResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить список сотрудников менеджера
      tags:
      - Admin
  /admin/plans/{plan_id}:
    get:
      consumes:
      - application/json
      description: Возвращает детальную информацию о плане с задачами
      parameters:
      - description: ID плана
        in: path
        name: plan_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PlanWithTasksResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить план по ID (админ)
      tags:
      - Admin
  /admin/plans/{plan_id}/test:
    get:
      consumes:
      - application/json
      description: Возвращает тест с ответами для просмотра администратором
      parameters:
      - description: ID плана
        in: path
        name: plan_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.StartTestResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить тест для администратора
      tags:
      - Admin
  /admin/users:
    get:
      consumes:
      - application/json
      description: Возвращает список всех пользователей с пагинацией и фильтрацией
      parameters:
      - default: 1
        description: Номер страницы
        in: query
        name: page
        type: integer
      - default: 20
        description: Количество на странице
        in: query
        name: limit
        type: integer
      - description: Фильтр по роли
        enum:
        - admin
        - manager
        - employee
        in: query
        name: role
        type: string
      - description: Поиск по email или имени
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListUsersResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить список пользователей
      tags:
      - Admin
  /admin/users/{id}:
    get:
      consumes:
      - application/json
      description: Возвращает детальную информацию о пользователе
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserDetailsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить пользователя по ID
      tags:
      - Admin
  /admin/users/{id}/avatar:
    get:
      consumes:
      - application/json
      description: Возвращает аватар пользователя
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: string
      produces:
      - image/jpeg
      - ' image/png'
      - ' image/gif'
      responses:
        "200":
          description: Аватар пользователя
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить аватар пользователя
      tags:
      - Admin
  /admin/users/{id}/manager:
    delete:
      consumes:
      - application/json
      description: Удаляет назначенного менеджера у сотрудника
      parameters:
      - description: ID сотрудника
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "204":
          description: No Content (менеджер не был назначен)
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Удалить менеджера у сотрудника
      tags:
      - Admin
    patch:
      consumes:
      - application/json
      description: Назначает менеджера для указанного сотрудника
      parameters:
      - description: ID сотрудника
        in: path
        name: id
        required: true
        type: string
      - description: ID менеджера
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AssignManagerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Назначить менеджера сотруднику
      tags:
      - Admin
  /admin/users/{id}/position:
    patch:
      consumes:
      - application/json
      description: Изменяет должность пользователя
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: string
      - description: Новая должность
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdatePositionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Обновить должность пользователя
      tags:
      - Admin
  /admin/users/{id}/profile:
    get:
      consumes:
      - application/json
      description: Возвращает расширенный профиль сотрудника с навыками и планами
      parameters:
      - description: ID сотрудника
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.EmployeeProfileResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить профиль сотрудника для админа
      tags:
      - Admin
  /admin/users/{id}/role:
    patch:
      consumes:
      - application/json
      description: Изменяет роль пользователя (только для админов)
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: string
      - description: Новая роль
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Нельзя удалить последнего админа
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Обновить роль пользователя
      tags:
      - Admin
  /ai/generate-plan:
    post:
      consumes:
      - application/json
      description: Генерирует план обучения на основе темы и описания
      parameters:
      - description: Данные для генерации плана
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.GeneratePlanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ai.GeneratedPlan'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Сгенерировать план с помощью ИИ
      tags:
      - AI
  /auth/login:
    post:
      consumes:
      - application/json
      description: Авторизация пользователя по email и паролю
      parameters:
      - description: Данные для входа
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Авторизация
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Инвалидирует refresh токен
      parameters:
      - description: Refresh токен
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Выход из системы
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Обновляет access и refresh токены
      parameters:
      - description: Refresh токен
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RefreshResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Обновить токены
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Регистрация нового пользователя
      parameters:
      - description: Данные для регистрации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Регистрация пользователя
      tags:
      - Auth
  /employee/plans:
    get:
      consumes:
      - application/json
      description: Возвращает список планов текущего сотрудника
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PlanWithTasksResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
